<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>live admin test</title></head>
<body>
<div id="log" style="font-family:monospace;white-space:pre-wrap"></div>
<iframe id="frame" src="/scorecard/admin/" style="width:900px;height:900px"></iframe>
<script>
const logEl = document.getElementById('log');
const results = [];
function ok(name, cond, extra) { results.push(`${cond ? 'PASS' : 'FAIL'} — ${name}${extra ? ' :: ' + extra : ''}`); }
function flush() { logEl.textContent = results.join('\n'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

const frame = document.getElementById('frame');
frame.addEventListener('load', async () => {
  await sleep(1500); // let admin.js's module graph + settings subscription finish
  try {
    const doc = frame.contentDocument;
    const win = frame.contentWindow;

    const loginErrors = [];
    win.addEventListener('error', (e) => loginErrors.push(`window error: ${e.message} (${e.filename}:${e.lineno})`));

    ok('iframe loaded the real deployed page', !!doc.getElementById('login-form'));
    ok('login form has email + password fields (firestore mode detected correctly)', !!doc.querySelector('[name="email"]') && !!doc.querySelector('[name="password"]'));
    ok('mode badge says Connected to Firebase (not local dev mode)', doc.getElementById('mode-badge')?.textContent.includes('Firebase'));

    const form = doc.getElementById('login-form');
    form.email.value = 'nonexistent-livecheck@example.com';
    form.password.value = 'definitely-wrong-password-123';
    form.dispatchEvent(new Event('submit', { cancelable: true }));
    await sleep(6000);

    const errEl = doc.getElementById('login-error');
    ok('submitting bad credentials shows an error message (proves the whole JS chain runs: import, event handler, Firebase call, catch, DOM update)', errEl && errEl.textContent.length > 0, errEl ? errEl.textContent : 'EMPTY — nothing displayed');
    ok('no uncaught window errors during the attempt', loginErrors.length === 0, loginErrors.join(' | '));

    // Also check what the login screen actually looks like right now, for reference.
    results.push('--- login-error element text: "' + (errEl?.textContent || '') + '" ---');
    results.push('--- mode-badge text: "' + (doc.getElementById('mode-badge')?.textContent || '') + '" ---');
  } catch (e) {
    results.push('FAIL — test threw: ' + (e && e.stack ? e.stack : e));
  }
  results.push('---DONE---');
  flush();
});
</script>
</body></html>
