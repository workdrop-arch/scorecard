<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>persistence diagnostic</title></head>
<body>
<div id="log" style="font-family:monospace;white-space:pre-wrap;font-size:12px"></div>
<script type="module">
const logEl = document.getElementById('log');
const results = [];
function ok(name, cond, extra) { results.push(`${cond ? 'PASS' : 'FAIL'} — ${name}${extra ? ' :: ' + extra : ''}`); }
function fail(name, err) { results.push(`FAIL — ${name} :: ${err && err.stack ? err.stack : err}`); }
function flush() { logEl.textContent = results.join('\n'); }

results.push('script started');
flush();

try {
  const { firestoreApp } = await import('/scorecard/shared/firestore-store.js');
  ok('firestore-store imported', true);
  const { getAuth, setPersistence, inMemoryPersistence, signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  ok('firebase-auth imported', true);
  const auth = getAuth(firestoreApp());
  ok('getAuth() returned something', !!auth);
  await setPersistence(auth, inMemoryPersistence);
  ok('setPersistence succeeded', true);
  flush();

  const t0 = Date.now();
  await signInWithEmailAndPassword(auth, 'claude-test-admin-temp@example.com', 'TempPass!9x2K7qLm');
  ok('sign-in with in-memory persistence completed', true, `took ${Date.now() - t0}ms`);
} catch (e) {
  fail('diagnostic', e);
}
results.push('---DONE---');
flush();
</script>
</body></html>
