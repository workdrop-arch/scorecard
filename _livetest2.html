<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>persistence diagnostic 2</title></head>
<body>
<div id="log" style="font-family:monospace;white-space:pre-wrap;font-size:12px"></div>
<script type="module">
const logEl = document.getElementById('log');
const results = [];
function ok(name, cond, extra) { results.push(`${cond ? 'PASS' : 'FAIL'} — ${name}${extra ? ' :: ' + extra : ''}`); }
function fail(name, err) { results.push(`FAIL — ${name} :: ${err && err.stack ? err.stack : err}`); }
function flush() { logEl.textContent = results.join('\n'); }

results.push('script started');
flush();

try {
  const { firestoreApp } = await import('/scorecard/shared/firestore-store.js');
  const { initializeAuth, inMemoryPersistence, signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  ok('imports done', true);
  flush();

  const auth = initializeAuth(firestoreApp(), { persistence: inMemoryPersistence });
  ok('initializeAuth() with inMemoryPersistence returned', !!auth);
  flush();

  let lastErr = null;
  for (let attempt = 1; attempt <= 4; attempt++) {
    const t0 = Date.now();
    try {
      await signInWithEmailAndPassword(auth, 'claude-test-admin-temp@example.com', 'TempPass!9x2K7qLm');
      ok(`sign-in completed on attempt ${attempt}`, true, `took ${Date.now() - t0}ms`);
      lastErr = null;
      break;
    } catch (e) {
      lastErr = e;
      results.push(`  attempt ${attempt} failed after ${Date.now() - t0}ms :: ${e.code || e.message}`);
      flush();
      await new Promise(r => setTimeout(r, 2000));
    }
  }
  if (lastErr) fail('all sign-in attempts', lastErr);
} catch (e) {
  fail('diagnostic', e);
}
results.push('---DONE---');
flush();
</script>
</body></html>
