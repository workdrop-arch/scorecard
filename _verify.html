<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>verify hidden fix</title></head>
<body>
<div id="log" style="font-family:monospace;white-space:pre-wrap"></div>
<iframe id="frame" src="/scorecard/admin/" style="width:900px;height:900px"></iframe>
<iframe id="gframe" src="/scorecard/golfer/" style="width:900px;height:900px"></iframe>
<script>
const logEl = document.getElementById('log');
const results = [];
function ok(name, cond, extra) { results.push(`${cond ? 'PASS' : 'FAIL'} — ${name}${extra ? ' :: ' + extra : ''}`); }
function flush() { logEl.textContent = results.join('\n'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let doneCount = 0;
async function checkFrame(frameId, label) {
  const frame = document.getElementById(frameId);
  await sleep(1200);
  const doc = frame.contentDocument;
  const win = frame.contentWindow;
  const loginScreen = doc.getElementById('login-screen');
  const appShell = doc.getElementById('app-shell');

  ok(`${label}: login-screen initially visible (no hidden attr)`, win.getComputedStyle(loginScreen).display !== 'none');
  ok(`${label}: app-shell initially hidden (has hidden attr from HTML)`, win.getComputedStyle(appShell).display === 'none');

  // Directly toggle, bypassing the real auth flow entirely — isolates
  // whether the CSS fix itself works, independent of Firebase.
  loginScreen.hidden = true;
  appShell.hidden = false;
  await sleep(50);

  ok(`${label}: setting .hidden=true on login-screen now actually hides it (THE FIX)`, win.getComputedStyle(loginScreen).display === 'none');
  ok(`${label}: setting .hidden=false on app-shell shows it`, win.getComputedStyle(appShell).display !== 'none');

  // And back, to confirm it's not a one-way fluke.
  loginScreen.hidden = false;
  appShell.hidden = true;
  await sleep(50);
  ok(`${label}: toggling back — login-screen visible again`, win.getComputedStyle(loginScreen).display !== 'none');
  ok(`${label}: toggling back — app-shell hidden again`, win.getComputedStyle(appShell).display === 'none');

  doneCount++;
  flush();
  if (doneCount === 2) { results.push('---DONE---'); flush(); }
}

document.getElementById('frame').addEventListener('load', () => checkFrame('frame', 'admin'));
document.getElementById('gframe').addEventListener('load', () => checkFrame('gframe', 'golfer'));
</script>
</body></html>
