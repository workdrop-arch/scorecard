<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Dashboard</title>
<link rel="stylesheet" href="../shared/design-system.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="hero">
  <div class="hero-title" id="hero-title-text">Golf Trip</div>
  <div class="hero-event" id="hero-event-text">Loading…</div>
</div>

<div class="tabs-wrap"><div class="tabs">
  <button class="tab-btn active" data-tab="ryder">Ryder Cup</button>
  <button class="tab-btn" data-tab="carletonplace">Carleton Place Cup</button>
  <button class="tab-btn" data-tab="side">Side Action</button>
  <button class="tab-btn" data-tab="weather">Schedule</button>
</div></div>

<div id="view-ryder" class="view active"></div>
<div id="view-carletonplace" class="view"></div>
<div id="view-side" class="view"></div>
<div id="view-weather" class="view"></div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
